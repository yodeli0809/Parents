<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학년 3반 마음 우체국</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        :root { 
            --font-handwriting: 'Gowun Dodum', sans-serif; 
            --bg-rainbow: linear-gradient(135deg, #fff5f5 0%, #fff9f0 25%, #f0fff4 50%, #f0f7ff 75%, #f6f0ff 100%);
        }
        
        body { 
            font-family: var(--font-handwriting); 
            background: var(--bg-rainbow); 
            background-attachment: fixed; 
            margin: 0; 
            padding: 20px; 
            color: #444; 
            word-break: keep-all; 
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        
        h1 { 
            color: #d63384; 
            font-size: 1.8rem; 
            margin-top: 30px; 
            margin-bottom: 10px; 
            font-weight: bold;
        }

        .subtitle { color: #888; font-size: 1rem; line-height: 1.6; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px;}
        
        .envelope-card { 
            border-radius: 15px; 
            padding: 25px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: none;
        }
        
        .envelope-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        .envelope-icon { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.9; }
        
        .student-name { 
            font-size: 1.15rem; 
            color: #333; 
            font-weight: bold; 
            letter-spacing: -0.5px;
        }

        #letterView { 
            display: none; 
            background: #fff; 
            min-height: 100vh; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            z-index: 100; 
            padding: 20px; 
            box-sizing: border-box; 
            background-image: radial-gradient(#f0f0f0 1.5px, transparent 1.5px); 
            background-size: 30px 30px; 
            overflow-y: auto; 
        }

        .paper { 
            background: #fdfdfd; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.05); 
            border: 1px solid #eee; 
            position: relative; 
            min-height: 450px; 
        }

        .paper::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 30px; 
            width: 1.5px; 
            height: 100%; 
            background: rgba(255, 0, 0, 0.05); 
        }

        .student-photo { width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; display: block; margin: 0 auto 20px auto; }
        #letterContent { font-size: 1.3rem; line-height: 1.8; color: #444; white-space: pre-wrap; margin: 20px 0; padding-left: 20px; }
        
        .btn-group { text-align: center; margin-top: 20px; }
        .btn { 
            display: inline-block; 
            padding: 10px 22px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-size: 1rem; 
            cursor: pointer; 
            border: none; 
            font-family: inherit; 
        }
        .back-btn { background: #eee; color: #666; }
    </style>
</head>
<body>

<div class="container" id="mainView">
    <h1>사랑하는 부모님께</h1>
    <p class="subtitle">1학년 3반 아이들의 진심을 담았습니다.</p>
    <div class="grid" id="mailboxGrid"></div>
</div>

<div id="letterView">
    <div class="paper">
        <img id="letterPhoto" class="student-photo" src="https://i.postimg.cc/4ybWJ6jg/IMG-6422.jpg" alt="우리 반 사진">
        <h2 id="letterTo" style="color: #d63384; font-size: 1.4rem; margin-top: 0; font-weight: bold;"></h2>
        <div id="letterContent"></div>
        <p id="letterFrom" style="text-align: right; font-size: 1.2rem; color: #777; font-weight: bold;"></p>
        
        <div class="btn-group">
            <button class="btn back-btn" onclick="closeLetter()">뒤로 가기</button>
        </div>
    </div>
</div>

<script>
    const students = [
        { name: "강동호", birthday: "0000", content: "" },
        { name: "권유빈", birthday: "0000", content: "" },
        { name: "김가연", birthday: "0000", content: "" },
        { name: "김다혜", birthday: "0000", content: "" },
        { name: "김예주", birthday: "0000", content: "" },
        { name: "김지은", birthday: "0000", content: "" },
        { name: "김창유", birthday: "0000", content: "" },
        { name: "김태건", birthday: "0000", content: "" },
        { name: "김하은", birthday: "0000", content: "" },
        { name: "라용준", birthday: "0000", content: "" },
        { name: "박정이", birthday: "0000", content: "" },
        { name: "박찬선", birthday: "0000", content: "" },
        { name: "박호건", birthday: "0000", content: "" },
        { name: "백준호", birthday: "0000", content: "" },
        { name: "선염동", birthday: "0000", content: "" },
        { name: "안승빈", birthday: "0000", content: "" },
        { name: "안시우", birthday: "0000", content: "" },
        { name: "안호준", birthday: "0000", content: "" },
        { name: "윤다온", birthday: "0000", content: "" },
        { name: "윤정후", birthday: "0000", content: "" },
        { name: "윤찬호", birthday: "0000", content: "" },
        { name: "정채훈", birthday: "0000", content: "" },
        { name: "정환희", birthday: "0000", content: "" },
        { name: "최승호", birthday: "0000", content: "" },
        { name: "한규희", birthday: "0000", content: "" },
        { name: "한다경", birthday: "0000", content: "" },
        { name: "허손명", birthday: "0000", content: "" },
        { name: "홍은우", birthday: "0000", content: "" }
    ];

    function getCardBgColor(step, total) { 
        const hue = (step / total) * 360; 
        return `hsl(${hue}, 50%, 85%)`; 
    }

    const grid = document.getElementById('mailboxGrid');

    students.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'envelope-card';
        card.style.backgroundColor = getCardBgColor(i, students.length);
        
        // 성을 제외한 이름 추출 (예: '강동호' -> '동호')
        const firstName = s.name.substring(1); 
        
        card.innerHTML = `<div class="envelope-icon">💌</div><div class="student-name">${firstName} 올림</div>`;
        card.onclick = () => {
            const pass = prompt(`${s.name} 학생의 생일을 입력해주세요 (4자리)`);
            if(pass === s.birthday) { showLetter(s); }
            else if(pass !== null) { alert("생일이 틀렸어요!"); }
        };
        grid.appendChild(card);
    });

    function showLetter(s) {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('letterView').style.display = 'block';
        document.getElementById('letterTo').innerText = `사랑하는 부모님께`;
        document.getElementById('letterContent').innerText = s.content || "키워주셔서 감사합니다. 사랑해요!";
        
        const firstName = s.name.substring(1);
        document.getElementById('letterFrom').innerText = `- 사랑하는 ${firstName} 올림 -`;
        window.scrollTo(0,0);
    }

    function closeLetter() { 
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('letterView').style.display = 'none';
    }
</script>
</body>
</html>
