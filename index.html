<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학년 3반 마음 우체국</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        :root { --font-handwriting: 'Gowun Dodum', sans-serif; --bg-color: #fffafb; }
        body { font-family: var(--font-handwriting); background-color: var(--bg-color); margin: 0; padding: 20px; color: #444; word-break: keep-all; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        h1 { color: #d63384; font-size: 2.2rem; margin-top: 20px; margin-bottom: 10px; font-weight: bold;}
        .subtitle { color: #666; font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; padding: 0 10px;}
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px;}
        .envelope-card { background: white; border-radius: 20px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 6px 15px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.3s ease; }
        .envelope-icon { font-size: 3.5rem; margin-bottom: 5px; }
        .student-name { font-size: 1.3rem; color: #333; font-weight: bold; }
        #letterView { display: none; background: #fff; min-height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 100; padding: 20px; box-sizing: border-box; background-image: radial-gradient(#f0f0f0 1.5px, transparent 1.5px); background-size: 30px 30px; overflow-y: auto; }
        .paper { background: #fdfdfd; max-width: 500px; margin: 0 auto; padding: 30px 20px; box-shadow: 0 0 20px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; min-height: 450px; text-align: left; }
        .paper::before { content: ''; position: absolute; top: 0; left: 30px; width: 1.5px; height: 100%; background: rgba(255, 0, 0, 0.1); }
        .student-photo { width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; display: block; margin: 0 auto 20px auto; }
        #letterContent { font-size: 1.4rem; line-height: 1.8; color: #2c3e50; white-space: pre-wrap; margin: 20px 0; padding-left: 20px; }
        .btn-group { text-align: center; margin-top: 20px; }
        .btn { display: inline-block; padding: 12px 25px; margin: 8px; border-radius: 30px; text-decoration: none; font-size: 1.1rem; cursor: pointer; border: none; font-family: inherit; }
        .back-btn { background: #ffb8b8; color: white; }
        .play-btn { background: #6c5ce7; color: white; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3); }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto" playsinline>
    <source src="https://actions.google.com/주소_대신_안전한_범용_음악_경로" type="audio/mpeg">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainView">
    <h1>사랑하는 부모님께 마음을 보냅니다.</h1>
    <p class="subtitle">각자의 속도와 방향대로 성장중인<br>1학년 3반 아이들의 사랑이 담긴 편지함입니다.</p>
    <div class="grid" id="mailboxGrid"></div>
</div>

<div id="letterView">
    <div class="paper">
        <img id="letterPhoto" class="student-photo" src="https://i.postimg.cc/4ybWJ6jg/IMG-6422.jpg" alt="우리 반 사진">
        <h2 id="letterTo" style="color: #e84393; font-size: 1.6rem; margin-top: 0; font-weight: bold;"></h2>
        <div id="letterContent"></div>
        <p id="letterFrom" style="text-align: right; font-size: 1.3rem; color: #636e72; font-weight: bold;"></p>
        
        <div class="btn-group">
            <button id="pBtn" class="btn play-btn" onclick="toggleMusic()">음악 듣기 🎵</button>
            <button class="btn back-btn" onclick="closeLetter()">뒤로 가기</button>
        </div>
    </div>
</div>

<script>
    const music = document.getElementById('bgMusic');
    const pBtn = document.getElementById('pBtn');

    const students = [
        { name: "김민수", birthday: "0505", content: "사랑하는 엄마 아빠!\n항상 감사합니다. 사랑해요!" },
        { name: "이영희", birthday: "1225", content: "부모님 딸이라서 너무 행복해요!" }
    ];

    if(students.length < 29) {
        for(let i=students.length+1; i<=29; i++) {
            students.push({ name: `학생 ${i}`, birthday: "0000", content: `사랑하는 부모님께,\n\n키워주셔서 감사합니다.\n사랑해요!` });
        }
    }

    function getRainbowColor(step, total) { const hue = (step / total) * 240; return `hsl(${hue}, 80%, 65%)`; }
    const grid = document.getElementById('mailboxGrid');

    students.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'envelope-card';
        card.innerHTML = `<div class="envelope-icon" style="color: ${getRainbowColor(i, 29)}">💌</div><div class="student-name">${s.name}</div>`;
        card.onclick = () => {
            const pass = prompt(`${s.name}의 생일을 입력해주세요 (4자리)`);
            if(pass === s.birthday) { showLetter(s); }
            else if(pass !== null) { alert("생일이 틀렸어요!"); }
        };
        grid.appendChild(card);
    });

    function showLetter(s) {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('letterView').style.display = 'block';
        document.getElementById('letterTo').innerText = `사랑하는 부모님께`;
        document.getElementById('letterContent').innerText = s.content;
        document.getElementById('letterFrom').innerText = `- 사랑하는 ${s.name} 올림 -`;
        window.scrollTo(0,0);
    }

    function toggleMusic() {
        if (music.paused) {
            music.play().then(() => {
                pBtn.innerText = "음악 끄기 🔇";
            }).catch(e => {
                alert("음악 파일 로딩 중입니다. 잠시 후 다시 눌러주세요!");
            });
        } else {
            music.pause();
            pBtn.innerText = "음악 듣기 🎵";
        }
    }

    function closeLetter() { music.pause(); music.currentTime = 0; location.reload(); }
</script>
</body>
</html>
